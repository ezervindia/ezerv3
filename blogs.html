<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Blog - EZERV Solutions India Pvt Ltd</title>
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/feather-icons/dist/feather.min.js"></script>
</head>
<body class="font-sans text-gray-800">
<div id="site-header"></div>
<!-- Hero Section -->
<section class="bg-gradient-to-r from-blue-600 to-blue-800 py-12 sm:py-16 text-center px-4">
  <div class="container mx-auto">
    <h1 class="text-3xl sm:text-4xl md:text-5xl font-bold text-white mb-4">Our Blog</h1>
    <p class="text-lg sm:text-xl text-blue-100 max-w-3xl mx-auto">Insights, tutorials, and industry trends from our technology experts</p>
  </div>
</section>

<!-- Blog Posts Section -->
<section class="py-12 sm:py-16 container mx-auto px-4 sm:px-6">
  <div id="blog-loading" class="text-center py-12">
    <div class="inline-block animate-spin rounded-full h-12 w-12 border-b-2 border-blue-600"></div>
    <p class="mt-4 text-gray-600">Loading blog posts...</p>
  </div>
  
  <div id="blog-list" class="hidden grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 sm:gap-8">
    <!-- Blog posts will be dynamically loaded here -->
  </div>
  
  <div id="no-blogs" class="hidden text-center py-12">
    <i data-feather="file-text" class="w-16 h-16 text-gray-400 mx-auto mb-4"></i>
    <h3 class="text-xl font-semibold text-gray-700 mb-2">No Blog Posts Yet</h3>
    <p class="text-gray-600">Check back soon for exciting content!</p>
  </div>
</section>

<div id="site-footer"></div>
<script src="scripts/common.js"></script>
</body>
</html>
